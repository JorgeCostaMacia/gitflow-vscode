name: Release

# Fully automatic: when the extension's release/hotfix finish pushes a v* tag,
# this builds the .vsix and creates the GitHub Release with it attached.
# No manual step needed.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the Release and upload the .vsix
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26.x
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG)."
            exit 1
          fi
          echo "Version OK: $PKG"

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:all

      - name: Package VSIX
        run: pnpm run package

      - name: Create Release and attach VSIX
        uses: softprops/action-gh-release@v3
        with:
          files: '*.vsix'
          generate_release_notes: true
